name: Process Single Tile

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Config file to use'
        required: false
        default: 'config/config_v1.txt'
        type: choice
        options:
          - config/config_v1.txt
      h:
        description: 'MODIS horizontal tile index (0-35)'
        required: true
        type: string
      v:
        description: 'MODIS vertical tile index (0-17)'
        required: true
        type: string

env:
  AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}

jobs:
  process-tile:
    name: process-tile-h${{ inputs.h }}-v${{ inputs.v }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.39.0
          environments: ci

      - name: Install package
        run: pixi run -e ci pip install -e .

      - name: Print config
        run: pixi run -e ci python processing/scripts/print_config.py --config-file ${{ inputs.config_file }}

      - name: Process tile
        env:
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: |
          pixi run -e ci python processing/scripts/process_single_tile.py \
            --h ${{ inputs.h }} \
            --v ${{ inputs.v }} \
            --config-file ${{ inputs.config_file }}
