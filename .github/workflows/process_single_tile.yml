name: Process Single Tile

on:
  workflow_dispatch:
    inputs:
      h:
        description: 'MODIS horizontal tile index (0-35)'
        required: true
        type: string
      v:
        description: 'MODIS vertical tile index (0-17)'
        required: true
        type: string

env:
  AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
  AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}

jobs:
  process-tile:
    name: process-tile-h${{ format('{0:02d}', inputs.h) }}-v${{ format('{0:02d}', inputs.v) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.39.0
          environments: ci

      - name: Install package
        run: pixi run -e ci pip install -e .

      - name: Process tile
        run: |
          pixi run -e ci python processing/scripts/process_single_tile.py \
            --h ${{ inputs.h }} \
            --v ${{ inputs.v }}
