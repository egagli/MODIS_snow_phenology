name: Process Single Tile

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Config file to use'
        required: false
        default: 'config/config_v1.txt'
        type: choice
        options:
          - config/config_v1.txt
      h:
        description: 'MODIS horizontal tile index (0-35)'
        required: true
        type: string
      v:
        description: 'MODIS vertical tile index (0-17)'
        required: true
        type: string

env:
  AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}

jobs:
  process-tile:
    name: process-tile-h${{ inputs.h }}-v${{ inputs.v }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.39.0
          environments: ci

      - name: Install package
        run: pixi run -e ci pip install -e .

      - name: Print config
        run: |
          pixi run -e ci python -c "
          import sys; sys.path.insert(0, '.')
          from modis_snow_phenology.config import Config
          c = Config('${{ inputs.config_file }}')
          print(f'Config file   : ${{ inputs.config_file }}')
          print(f'config_name   : {c.config_name}')
          print(f'version       : {c.version}')
          print(f'azure_container      : {c.azure_container}')
          print(f'azure_storage_account: {c.azure_storage_account}')
          print(f'icechunk_prefix      : {c.icechunk_prefix}')
          print(f'tile_status_path     : {c.tile_status_path}')
          print(f'wy_start      : {c.wy_start}')
          print(f'wy_end        : {c.wy_end}')
          print(f'shard_shape   : {c.shard_shape}')
          print(f'inner_chunk_shape: {c.inner_chunk_shape}')
          "

      - name: Process tile
        run: |
          pixi run -e ci python processing/scripts/process_single_tile.py \
            --h ${{ inputs.h }} \
            --v ${{ inputs.v }} \
            --config-file ${{ inputs.config_file }}
