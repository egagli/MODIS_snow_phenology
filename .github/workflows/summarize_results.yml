name: Summarize Results

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Config file to use'
        required: false
        default: 'config/config_v1.txt'
        type: choice
        options:
          - config/config_v1.txt
      run_id:
        description: 'GitHub Actions run ID to query for failures (leave blank to skip failure detection)'
        required: false
        default: ''
        type: string

env:
  AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}

permissions:
  contents: write
  actions: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.39.0
          environments: ci

      - name: Install package
        run: pixi run -e ci pip install -e .

      - name: Print config
        run: |
          pixi run -e ci python -c "
          import sys; sys.path.insert(0, '.')
          from modis_snow_phenology.config import Config
          c = Config('${{ inputs.config_file }}')
          print(f'Config file   : ${{ inputs.config_file }}')
          print(f'config_name   : {c.config_name}')
          print(f'version       : {c.version}')
          print(f'azure_container      : {c.azure_container}')
          print(f'azure_storage_account: {c.azure_storage_account}')
          print(f'icechunk_prefix      : {c.icechunk_prefix}')
          print(f'tile_status_path     : {c.tile_status_path}')
          print(f'wy_start      : {c.wy_start}')
          print(f'wy_end        : {c.wy_end}')
          print(f'shard_shape   : {c.shard_shape}')
          print(f'inner_chunk_shape: {c.inner_chunk_shape}')
          "

      - name: Update tile processing status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -n "$RUN_ID" ]; then
            pixi run -e ci python processing/scripts/summarize_processing.py \
              --config-file ${{ inputs.config_file }} \
              --run-id "$RUN_ID" \
              --github-token "${{ secrets.GITHUB_TOKEN }}" \
              --repo "${{ github.repository }}"
          else
            pixi run -e ci python processing/scripts/summarize_processing.py \
              --config-file ${{ inputs.config_file }}
          fi

      - name: Commit updated GeoJSON
        run: |
          if [[ -n "$(git status --porcelain processing/tile_data/tile_processing_status.geojson)" ]]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action (summarize-results)"
            git add processing/tile_data/tile_processing_status.geojson
            git commit -m "Update tile processing status"

            for i in {1..3}; do
              if git pull --rebase origin main && git push; then
                echo "✅ Pushed updated tile status"
                break
              fi
              echo "⚠️  Push attempt $i/3 failed, retrying in 5s..."
              sleep 5
              if [ $i -eq 3 ]; then
                echo "❌ Failed to push after 3 attempts"
                exit 1
              fi
            done
          else
            echo "✅ No changes to tile status GeoJSON"
          fi
